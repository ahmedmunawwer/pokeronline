<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texas Hold'em Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #1a0f0a; }
        
        .poker-table-bg {
            background: radial-gradient(circle, #198754 0%, #0a3622 80%);
            border: 8px solid #5d4037;
            border-radius: 120px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.9);
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.1;
            max-height: 440px;
            margin: 30px 0 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .playing-card, .community-card {
            perspective: 1000px;
        }
        .playing-card { width: 22px; height: 32px; margin: 0 2px; }
        .community-card { width: 36px; height: 52px; }
        
        .card-inner {
            width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            position: relative;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
        }
        .card-back {
            background: repeating-linear-gradient(45deg, #0d2518 0, #0d2518 4px, #1a4a30 4px, #1a4a30 8px);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .community-card .card-back {
            background: repeating-linear-gradient(45deg, #8b1a1a 0, #8b1a1a 5px, #b22222 5px, #b22222 10px);
        }
        .card-front {
            background: white; color: black; transform: rotateY(180deg);
            box-shadow: inset 0 0 2px rgba(0,0,0,0.2);
        }
        
        /* Custom sleek scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            margin: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(240, 192, 64, 0.4);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(240, 192, 64, 0.8);
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(240, 192, 64, 0.4) rgba(0, 0, 0, 0.2);
        }
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokerTracker">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f0c040">
</head>
<body>
    <div id="app"></div>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg))
                    .catch(err => console.log('SW error:', err));
            });
        }
        window.storage = {
            get: async (key) => ({ value: localStorage.getItem(key) }),
            set: async (key, value) => { localStorage.setItem(key, value); },
            delete: async (key) => { localStorage.removeItem(key); }
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const G="#f0c040",SV="#aab4be",BR="#cd7f32",DIM="rgba(255,255,255,0.4)",SKEY="ptv7";
        const PLAYER_COLORS = ["#ff595e", "#ffca3a", "#8ac926", "#1982c4", "#6a4c93", "#f15bb5", "#00f5d4", "#fca311", "#9b5de5", "#00bbf9"];
        const MED=["🥇","🥈","🥉","4th","5th","6th","7th","8th","9th","10th"];
        const TIERS=[["High Card","One Pair","Two Pair","Three of a Kind"],["Straight","Flush","Full House"],["Four of a Kind","Straight Flush","Royal Flush"]];
        const RV={"High Card":1,"One Pair":2,"Two Pair":3,"Three of a Kind":4,"Straight":5,"Flush":6,"Full House":7,"Four of a Kind":8,"Straight Flush":9,"Royal Flush":10};
        const PPH={preflop:"preflop_start",flop_reveal:"preflop_start",flop:"flop_reveal",turn_reveal:"flop_reveal",turn:"turn_reveal",river_reveal:"turn_reveal",river:"river_reveal",showdown:"river_reveal"};
        const PL={preflop_start:"PRE-FLOP",preflop:"PRE-FLOP",flop_reveal:"FLOP",flop:"FLOP",turn_reveal:"TURN",turn:"TURN",river_reveal:"RIVER",river:"RIVER",showdown:"SHOWDOWN",end:"HAND OVER",session_end:"SESSION OVER"};
        const RVLI={flop_reveal:{t:"THE FLOP",s:"Reveal 3 community cards",i:"🃏 🃏 🃏"},turn_reveal:{t:"THE TURN",s:"Reveal the 4th card",i:"🃏"},river_reveal:{t:"THE RIVER",s:"Reveal the 5th card",i:"🃏"}};
        const NP={preflop:"flop_reveal",flop:"turn_reveal",turn:"river_reveal",river:"showdown"};

        const Btn=({onClick,bg,children,full,sm,dis,style})=><button onClick={dis?null:onClick} style={Object.assign({background:bg||"#2a8a46",border:"none",borderRadius:10,color:"#fff",padding:sm?"7px 10px":"11px 15px",fontSize:sm?12:14,fontWeight:700,cursor:dis?"default":"pointer",opacity:dis?0.5:1,width:full?"100%":null,boxSizing:"border-box"},style||{})}>{children}</button>;
        const Card=({children,sx})=><div style={Object.assign({background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:16,padding:16,marginBottom:12},sx||{})}>{children}</div>;
        const Fld=({lbl,val,ch,ph,type,mb})=><div style={{marginBottom:mb||8}}>{lbl&&<div style={{color:DIM,fontSize:13,marginBottom:4}}>{lbl}</div>}<input type={type||"text"} value={val} onChange={ch} placeholder={ph} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:9,color:"#fff",padding:"10px 13px",fontSize:15,outline:"none",width:"100%",boxSizing:"border-box"}}/></div>;
        const Ov=({children})=><div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,overflowY:"auto"}}><div style={{maxWidth:370,width:"100%"}}>{children}</div></div>;
        const DB=({children,sx})=><div style={Object.assign({background:"#0d2518",border:"1px solid rgba(240,192,64,0.4)",borderRadius:20,padding:22,boxSizing:"border-box"},sx||{})}>{children}</div>;
        const SR=({l,v,hi})=><div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:13}}><span style={{color:DIM,marginRight:6,flexShrink:0}}>{l}</span><span style={{color:hi?G:"#fff",fontWeight:hi?700:400,textAlign:"right"}}>{v}</span></div>;
        const SS=({title,children})=><div style={{marginBottom:12}}><div style={{color:G,fontWeight:700,fontSize:12,marginBottom:5,borderBottom:"1px solid rgba(240,192,64,0.2)",paddingBottom:3}}>{title}</div>{children}</div>;

        const HoleCard = ({up}) => (
            <div className="playing-card">
                <div className={`card-inner ${up ? 'flipped' : ''}`}>
                    <div className="card-back"></div>
                    <div className="card-front"><span style={{color: '#d32f2f', fontSize: 16}}>♥</span></div>
                </div>
            </div>
        );

        const CommCard = ({up}) => (
            <div className="community-card">
                <div className={`card-inner ${up ? 'flipped' : ''}`}>
                    <div className="card-back"></div>
                    <div className="card-front"><span style={{fontSize: 24, color: '#000'}}>♠</span></div>
                </div>
            </div>
        );

        function getCommunityCards(phase) {
            if (phase === 'preflop_start' || phase === 'preflop') return [];
            if (phase === 'flop_reveal') return [false, false, false];
            if (phase === 'flop') return [true, true, true];
            if (phase === 'turn_reveal') return [true, true, true, false];
            if (phase === 'turn') return [true, true, true, true];
            if (phase === 'river_reveal') return [true, true, true, true, false];
            if (phase === 'river' || phase === 'showdown' || phase === 'end' || phase === 'session_end') return [true, true, true, true, true];
            return [];
        }

        const ChipStackSVG = ({ amount, maxChips = 10 }) => {
            const [bump, setBump] = useState(false);
            useEffect(() => {
                if(amount > 0) {
                    setBump(true);
                    const t = setTimeout(() => setBump(false), 200);
                    return () => clearTimeout(t);
                }
            }, [amount]);

            const chipCount = amount === 0 ? 0 : Math.min(maxChips, Math.max(1, Math.ceil(amount / (amount >= 1000 ? 500 : 50))));
            if (chipCount === 0) return null;
            const colors = ['#d32f2f', '#1976d2', '#388e3c', '#fbc02d', '#8e24aa'];
            const height = 15 + chipCount * 5;
            
            return (
                <div style={{ 
                    width: '100%', 
                    transform: bump ? 'translateY(-4px)' : 'none', 
                    transition: 'transform 0.15s' 
                }}>
                    <svg width="100%" height="100%" viewBox={`0 0 40 ${height}`} style={{overflow: 'visible', filter: 'drop-shadow(0 4px 5px rgba(0,0,0,0.6))'}}>
                        {Array.from({length: chipCount}).map((_, i) => {
                            const y = (chipCount - 1 - i) * 5;
                            const color = colors[(i + (amount%3)) % colors.length];
                            return (
                                <g key={i} transform={`translate(0, ${y})`}>
                                    <path d="M 2 10 A 18 7 0 0 0 38 10 L 38 15 A 18 7 0 0 1 2 15 Z" fill={color} stroke="#000" strokeWidth="1" />
                                    <path d="M 2 10 A 18 7 0 0 0 38 10 L 38 15 A 18 7 0 0 1 2 15 Z" fill="#000" opacity="0.3" />
                                    <ellipse cx="20" cy="10" rx="18" ry="7" fill={color} stroke="#000" strokeWidth="1"/>
                                    <ellipse cx="20" cy="10" rx="13" ry="5" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="1.5" strokeDasharray="4,2"/>
                                    <ellipse cx="20" cy="10" rx="6" ry="2" fill="rgba(255,255,255,0.3)"/>
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

        const AnimatedPot = ({ pot, eligible, players }) => {
            const [bump, setBump] = useState(false);
            useEffect(() => {
                if(pot > 0) {
                    setBump(true);
                    const t = setTimeout(() => setBump(false), 200);
                    return () => clearTimeout(t);
                }
            }, [pot]);

            return (
                <div style={{
                    display: 'flex', flexDirection: 'column', alignItems: 'center', zIndex: 5
                }}>
                    {pot > 0 ? (
                        <div style={{ width: 44, marginBottom: 2 }}>
                            <ChipStackSVG amount={pot} maxChips={12} />
                        </div>
                    ) : (
                        <div style={{height: 15}}></div>
                    )}
                    
                    <div style={{
                        background: 'linear-gradient(180deg, #fff 0%, #f0c040 100%)',
                        WebkitBackgroundClip: 'text',
                        WebkitTextFillColor: 'transparent',
                        fontSize: 28, fontWeight: 900,
                        transform: bump ? 'scale(1.2)' : 'scale(1)',
                        transition: 'transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                        textShadow: '0 0 15px rgba(240,192,64,0.6)',
                        lineHeight: 1
                    }}>
                        ${pot}
                    </div>
                    <div style={{fontSize: 10, color: 'rgba(255,255,255,0.6)', letterSpacing: 1, textTransform: 'uppercase', marginTop: 2}}>Main Pot</div>
                    <div style={{display:'flex', gap:4, justifyContent:'center', marginTop: 6, flexWrap: 'wrap', maxWidth: 80}}>
                        {eligible && players && eligible.map(ep => {
                            const pi = players.findIndex(p=>p.id===ep.id);
                            if(pi === -1) return null;
                            return <div key={ep.id} style={{width: 8, height: 8, borderRadius: '50%', background: PLAYER_COLORS[pi % PLAYER_COLORS.length], boxShadow: '0 0 4px rgba(0,0,0,0.5)'}} title={ep.name}></div>
                        })}
                    </div>
                </div>
            );
        };

        const AnimatedSidePot = ({ potAmount, label, eligible, players }) => {
            const [bump, setBump] = useState(false);
            useEffect(() => {
                if(potAmount > 0) {
                    setBump(true);
                    const t = setTimeout(() => setBump(false), 200);
                    return () => clearTimeout(t);
                }
            }, [potAmount]);

            return (
                <div style={{
                    display: 'flex', flexDirection: 'column', alignItems: 'center', zIndex: 5,
                    background: 'rgba(0,0,0,0.4)', borderRadius: 12, padding: '4px 8px', border: '1px solid rgba(160,100,240,0.3)',
                    transform: bump ? 'scale(1.1)' : 'scale(1)',
                    transition: 'transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                }}>
                    <div style={{ width: 24, marginBottom: 2 }}>
                        <ChipStackSVG amount={potAmount} maxChips={5} />
                    </div>
                    <div style={{
                        color: '#c8a0ff', fontSize: 16, fontWeight: 800, textShadow: '0 0 8px rgba(160,100,240,0.5)'
                    }}>
                        ${potAmount}
                    </div>
                    <div style={{fontSize: 8, color: 'rgba(255,255,255,0.5)', letterSpacing: 0.5, textTransform: 'uppercase'}}>{label}</div>
                    <div style={{display:'flex', gap:3, justifyContent:'center', marginTop: 4, flexWrap: 'wrap', maxWidth: 60}}>
                        {eligible && players && eligible.map(ep => {
                            const pi = players.findIndex(p=>p.id===ep.id);
                            if(pi === -1) return null;
                            return <div key={ep.id} style={{width: 6, height: 6, borderRadius: '50%', background: PLAYER_COLORS[pi % PLAYER_COLORS.length], boxShadow: '0 0 3px rgba(0,0,0,0.8)'}} title={ep.name}></div>
                        })}
                    </div>
                </div>
            );
        };

        function buildPots(pls,cont,aiSet){
          const ids=pls.map(p=>p.id);
          if(!aiSet.length)return[{amount:ids.reduce((s,id)=>s+(cont[id]||0),0),eligible:pls.filter(p=>!p.folded),label:"Pot"}];
          const lvls=[...new Set(aiSet.map(id=>cont[id]||0))].sort((a,b)=>a-b);
          const pots=[],tc={...cont};let pv=0,pn=0;
          for(const l of lvls){const cap=l-pv;let amt=0;ids.forEach(id=>{const t=Math.min(tc[id]||0,cap);amt+=t;tc[id]=(tc[id]||0)-t;});if(amt>0){pots.push({amount:amt,eligible:pls.filter(p=>!p.folded&&(cont[p.id]||0)>=l),label:pn===0?"Main Pot":"Side Pot "+pn});pn++;}pv=l;}
          const rem=ids.reduce((s,id)=>s+(tc[id]||0),0);
          if(rem>0)pots.push({amount:rem,eligible:pls.filter(p=>!p.folded&&!aiSet.includes(p.id)&&(cont[p.id]||0)>lvls[lvls.length-1]),label:pn===0?"Main Pot":"Side Pot "+pn});
          return pots;
        }
        function calcSPts(sorted){const n=sorted.length,pts={};sorted.forEach((p,i)=>{pts[p.id]=i===0?n:Math.max(0,n-1-i);});return pts;}
        function findP(arr,id){return arr.find(p=>p.id===id)||null;}
        function computeStats(hist,pls){
          if(!hist||!hist.length)return null;
          const ps={};pls.forEach(p=>{ps[p.id]={id:p.id,name:p.name,won:0,lost:0,folds:0,checks:0,raises:0,bet:0,bw:0,bl:0,bs:0,hr:[],hp:0};});
          const sc={};
          hist.forEach(h=>{
            sc[h.sn]=(sc[h.sn]||0)+1;
            pls.forEach(p=>{const st=ps[p.id];if(!st)return;st.hp++;const net=h.net[p.id]||0;if(p.id===h.wid){st.won++;if(net>st.bw)st.bw=net;if(h.hr)st.hr.push(h.hr);}else{st.lost++;if(Math.abs(net)>st.bl)st.bl=Math.abs(net);}});
            (h.acts||[]).forEach(a=>{const st=ps[a.id];if(!st)return;if(a.t==="fold")st.folds++;else if(a.t==="check")st.checks++;else if(a.t==="raise"||a.t==="allin"){st.raises++;st.bet+=a.v;if(a.v>st.bs)st.bs=a.v;}});
          });
          const maxH=Math.max(...Object.values(sc),0),pArr=Object.values(ps);
          const top=fn=>pArr.slice().sort((a,b)=>fn(b)-fn(a))[0]||null;
          const hf={};pArr.forEach(p=>{const f={};p.hr.forEach(r=>{f[r]=(f[r]||0)+1;});hf[p.id]=Object.entries(f).sort((a,b)=>b[1]-a[1])[0]||null;});
          return{pArr,maxH,top,hf,bestH:hist.filter(h=>h.hr).sort((a,b)=>(RV[b.hr]||0)-(RV[a.hr]||0))[0]||null,consistent:pArr.filter(p=>p.hp>0).sort((a,b)=>(b.won/b.hp)-(a.won/a.hp))[0]||null,inconsistent:pArr.filter(p=>p.hp>0).sort((a,b)=>(a.won/a.hp)-(b.won/b.hp))[0]||null};
        }
        function StatsMod({hist,pls,scores,onClose}){
          const st=computeStats(hist,pls),nm=(x,f)=>x?x.name+(f?" ("+f(x)+")":""):"—";
          return(<Ov><DB><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{color:G,fontWeight:800,fontSize:16}}>📊 Statistics</span><Btn sm bg="#333" onClick={onClose}>✕</Btn></div>
          <div style={{maxHeight:"72vh",overflowY:"auto"}}>
          {!st?<p style={{color:DIM,fontSize:13}}>No hands yet.</p>:<div>
            <SS title="🏆 Performance"><SR l="Most won" v={nm(st.top(p=>p.won),p=>p.won)} hi/><SR l="Most lost" v={nm(st.top(p=>p.lost),p=>p.lost)}/><SR l="Most consistent" v={st.consistent?st.consistent.name:"—"} hi/><SR l="Most inconsistent" v={st.inconsistent?st.inconsistent.name:"—"}/><SR l="Max hands/session" v={st.maxH+""}/></SS>
            <SS title="💰 Money"><SR l="Biggest single win" v={nm(st.top(p=>p.bw),p=>"+"+p.bw)} hi/><SR l="Biggest single loss" v={nm(st.top(p=>p.bl),p=>"-"+p.bl)}/><SR l="Highest total bets" v={nm(st.top(p=>p.bet),p=>p.bet)} hi/><SR l="Lowest total bets" v={nm(st.top(p=>-p.bet),p=>p.bet)}/><SR l="Biggest single bet" v={nm(st.top(p=>p.bs),p=>p.bs)}/></SS>
            <SS title="🎲 Actions"><SR l="Most raises" v={nm(st.top(p=>p.raises),p=>p.raises)} hi/><SR l="Most checks" v={nm(st.top(p=>p.checks),p=>p.checks)}/><SR l="Most folds" v={nm(st.top(p=>p.folds),p=>p.folds)}/></SS>
            <SS title="🃏 Best Hand Ever"><SR l="Hand" v={st.bestH?st.bestH.wname+": "+st.bestH.hr:"None"} hi/></SS>
            <SS title="🎯 Fav Winning Hand">{st.pArr.map(p=><SR key={p.id} l={p.name} v={st.hf[p.id]?st.hf[p.id][0]+" ×"+st.hf[p.id][1]:"—"}/>)}</SS>
            <SS title="🏅 Scores">{pls.slice().sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0)).map((p,i)=><SR key={p.id} l={MED[i]+" "+p.name} v={(scores[p.id]||0)+" pts"} hi={i===0}/>)}</SS>
          </div>}
          </div></DB></Ov>);
        }
        function CDlg({d,onClose,onConfirm}){return(<Ov><DB><div style={{textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:8}}>{d.type==="winner"?"🏆":"🤝"}</div>
          <p style={{color:G,fontWeight:800,fontSize:18,margin:"0 0 4px"}}>{d.type==="winner"?d.name+" Wins!":"Split Pot?"}</p>
          <p style={{color:DIM,fontSize:13,margin:"0 0 4px"}}>{d.label}</p>
          <p style={{color:G,fontSize:22,fontWeight:800,margin:"0 0 14px"}}>{d.amt} chips</p>
          {d.names&&<p style={{color:DIM,fontSize:12,margin:"-8px 0 12px"}}>{d.names}</p>}
          <div style={{display:"flex",gap:10}}><Btn full bg="rgba(255,255,255,0.1)" onClick={onClose}>Cancel</Btn><Btn full bg="#1a7a40" onClick={onConfirm}>Confirm ✓</Btn></div>
        </div></DB></Ov>);}
        function HRDlg({d,onSelect,setTier,onSkip}){return(<Ov><DB>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            {d.tier>0&&<button onClick={()=>setTier(d.tier-1)} style={{background:"none",border:"none",color:G,fontSize:22,cursor:"pointer",padding:0}}>←</button>}
            <span style={{color:G,fontWeight:800,fontSize:15}}>What hand did they have?</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {TIERS[d.tier].map(h=><button key={h} onClick={()=>onSelect(h)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,color:"#fff",padding:"10px 14px",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"left"}}>{h}</button>)}
            {d.tier<2&&<button onClick={()=>setTier(d.tier+1)} style={{background:"rgba(160,100,240,0.15)",border:"1px solid rgba(160,100,240,0.3)",borderRadius:10,color:"#c8a0ff",padding:"10px 14px",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"left"}}>Higher Ranks →</button>}
            <button onClick={onSkip} style={{background:"none",border:"none",color:DIM,fontSize:12,cursor:"pointer",padding:"6px 0"}}>Skip / Unknown</button>
          </div>
        </DB></Ov>);}
        function SSDlg({d,sel,setSel,onClose,onSplit}){return(<Ov><DB>
          <p style={{color:G,fontWeight:800,marginTop:0}}>Select Players to Split</p>
          <p style={{color:DIM,fontSize:13,margin:"0 0 10px"}}>{d.label}: {d.amt} chips</p>
          {d.eligible.map(p=>{const s=sel.includes(p.id);return(<div key={p.id} onClick={()=>setSel(s?sel.filter(id=>id!==p.id):[...sel,p.id])} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,marginBottom:5,background:s?"rgba(240,192,64,0.15)":"rgba(255,255,255,0.05)",border:s?"1px solid rgba(240,192,64,0.4)":"1px solid transparent",cursor:"pointer"}}>

              <div style={{marginBottom:8}}></div>
              <p style={{color:G,fontWeight:700,marginTop:0,marginBottom:10}}>{actP.name}'s Turn {toCall>0&&<span style={{color:DIM,fontWeight:400,fontSize:13}}> · To call: {toCall}</span>}</p>
              {!rm?(()=>{
                const activeWithChips = players.filter(p => !p.folded && p.stack > 0).length;
                const canRaiseBtn = !(curBet > lfb && (rBets[actI]||0) >= lfb) && activeWithChips > 1;
                return <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {toCall===0?<Btn style={{flex:1}} bg="#2a7a4b" onClick={doCheck}>Check</Btn>:<Btn style={{flex:1}} bg="#2a7a4b" onClick={doCall}>Call {toCall}</Btn>}
                  <Btn style={{flex:1}} bg="#b8880e" dis={!canRaiseBtn} onClick={()=>{if(canRaiseBtn)setRm(true);}}>{ba}</Btn>
                  <Btn style={{flex:1}} bg="#8b1a1a" onClick={doFold}>Fold</Btn>
                </div>
              })():<div>
                <div style={{color:DIM,fontSize:13,marginBottom:4}}>{ba} amount (min: {lr})</div>
                <input type="number" value={ra} onChange={e=>setRa(e.target.value)} placeholder={"Min "+lr} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:9,color:"#fff",padding:"10px 13px",fontSize:15,outline:"none",width:"100%",boxSizing:"border-box",marginBottom:8}}/>
                <input type="range" min={lr} max={Math.max(lr, actP.stack - toCall)} value={ra||lr} onChange={e=>{setRa(e.target.value);setMc(true);}} style={{width:"100%",marginBottom:12, accentColor: "#f0c040", cursor: "pointer"}} />
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  {!mc?<Btn sm bg="#1a5c30" onClick={()=>{setRa(String(lr));setMc(true);}}>+{lr} (Min)</Btn>:<><Btn sm bg="#1a5c30" onClick={()=>setRa(String(Number(ra||0)+Math.floor(cfg.bb/2)))}>+{Math.floor(cfg.bb/2)}</Btn><Btn sm bg="#1a5c30" onClick={()=>setRa(String(Number(ra||0)+cfg.bb))}>+{cfg.bb}</Btn></>}
                  <Btn sm bg="#7a1a7a" onClick={doAllIn}>All In ({actP.stack})</Btn>
                </div>
                <div style={{display:"flex",gap:8}}><Btn style={{flex:1}} bg="#b8880e" onClick={doRaise}>Confirm {ba}</Btn><Btn style={{flex:1}} bg="#444" onClick={()=>{setRm(false);setRa("");setMc(false);}}>Cancel</Btn></div>
              </div>}
            </Card>}

            {phase==="showdown"&&cpd&&<Card>
              <div style={{marginBottom:8}}></div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><p style={{color:G,fontWeight:700,margin:0}}>SHOWDOWN</p>{cp.length>1&&<span style={{fontSize:12,color:DIM}}>Pot {pi+1}/{cp.length}</span>}</div>
              {cp.length>1&&<div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>{cp.map((p,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,borderRadius:6,padding:"3px 8px",fontWeight:700,background:i===pi?(i===0?"rgba(240,192,64,0.25)":"rgba(160,100,240,0.25)"):"rgba(255,255,255,0.06)",color:i===pi?(i===0?G:"#c8a0ff"):DIM}}><span>{p.label}: {p.amount}</span><div style={{display:'flex',gap:2}}>{p.eligible.map(ep=>{const pIdx=players.findIndex(pl=>pl.id===ep.id);return pIdx>=0&&<div key={ep.id} style={{width:6,height:6,borderRadius:'50%',background:PLAYER_COLORS[pIdx%PLAYER_COLORS.length]}}></div>;})}</div></div>)}</div>}
              <p style={{color:DIM,fontSize:13,marginBottom:10}}>Award <b style={{color:pi===0?G:"#c8a0ff"}}>{cpd.label} ({cpd.amount})</b></p>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:8}}>
                {cpd.eligible.map(p=>{const isAI=ai.includes(p.id);const pIdx=players.findIndex(pl=>pl.id===p.id);return(<button key={p.id} onClick={()=>setCdlg({type:"winner",id:p.id,name:p.name,label:cpd.label,amt:cpd.amount})} style={{background:isAI?"rgba(122,26,122,0.15)":"rgba(240,192,64,0.1)",border:isAI?"1px solid rgba(160,100,240,0.4)":"1px solid rgba(240,192,64,0.4)",borderRadius:12,color:"#fff",padding:"12px 15px",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:'flex',alignItems:'center'}}><div style={{width:10,height:10,borderRadius:'50%',background:PLAYER_COLORS[pIdx%PLAYER_COLORS.length],marginRight:8}}></div><span>{p.name}{isAI&&<span style={{fontSize:11,color:"#c8a0ff",marginLeft:5}}>[AI]</span>}</span></div><span style={{color:isAI?"#c8a0ff":G}}>{p.stack}</span></button>);})}
              </div>
              {cpd.eligible.length>1&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
                <Btn full bg="rgba(80,140,255,0.15)" onClick={()=>setCdlg({type:"split",eligible:cpd.eligible,amt:cpd.amount,label:cpd.label,names:cpd.eligible.map(e=>e.name).join(" & ")})}>🤝 Split Between All Remaining</Btn>
                <Btn full bg="rgba(80,140,255,0.08)" onClick={()=>{setSsel([]);setSseld({eligible:cpd.eligible,amt:cpd.amount,label:cpd.label});}}>✂️ Split Between Selected Players</Btn>
              </div>}
            </Card>}

            {phase==="end"&&wi&&<Card sx={{textAlign:"center"}}>
              <div style={{fontSize:38,marginBottom:6}}>🏆</div>
              <p style={{color:G,fontWeight:800,fontSize:19,margin:"0 0 4px"}}>{wi.name} wins!</p>
              <p style={{color:DIM,margin:"0 0 12px"}}>+{wi.amt} chips</p>
              <Card>{sortedSt.map((p,i)=><div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><span>{MED[i]} {p.name}</span><span style={{color:G,fontWeight:700}}>{p.stack}</span></div>)}</Card>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <Btn full onClick={()=>startHand(players,(dealer+1)%n,cfg,hn+1,sn)}>Next Hand</Btn>
                {sn<cfg.sessions&&<Btn full bg="#444" onClick={nextSession}>Next Session</Btn>}
                {sn>=cfg.sessions&&<Btn full bg="#7a1a1a" onClick={()=>setGameOver(true)}>End Game</Btn>}
              </div>
            </Card>}

            <Card><p style={{color:G,fontWeight:700,marginTop:0,marginBottom:6,fontSize:13}}>Action Log</p><div style={{maxHeight:90,overflowY:"auto",fontSize:12,color:DIM}}>{log.map((l,i)=><div key={i} style={{padding:"2px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>{l}</div>)}</div></Card>
          </div></div>);
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
